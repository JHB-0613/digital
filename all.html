<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>디지털게임과 문화 - 실시간 통합 퀴즈</title>
    <style>
        /* 기존 스타일 유지 */
        body { font-family: 'Malgun Gothic', sans-serif; line-height: 1.6; max-width: 900px; margin: 0 auto; padding: 20px; background-color: #f8f9fa; color: #333; }
        nav { background: #2c3e50; padding: 15px; border-radius: 8px; margin-bottom: 30px; display: flex; justify-content: center; gap: 10px; }
        nav a { color: white; text-decoration: none; padding: 8px 15px; border-radius: 4px; font-size: 14px; }
        .current { background: #e67e22; font-weight: bold; }
        h1 { text-align: center; color: #2c3e50; border-bottom: 3px solid #e67e22; padding-bottom: 10px; }
        .week-section { margin-top: 40px; border-top: 2px dashed #ccc; padding-top: 20px; }
        .question-card { background: white; padding: 25px; margin-bottom: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-left: 5px solid #e67e22; }
        .q-text { font-size: 1.1em; font-weight: bold; margin-bottom: 15px; display: block; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .opt-btn { padding: 12px; border: 1px solid #ddd; background: #fff; border-radius: 8px; cursor: pointer; text-align: left; }
        .opt-btn.selected { background: #e67e22; color: white; }
        input[type="text"], textarea { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; margin-top: 10px; box-sizing: border-box; }
        .feedback { display: none; margin-top: 15px; padding: 15px; border-radius: 8px; font-weight: bold; }
        .feedback.correct { background: #d4edda; color: #155724; }
        .feedback.wrong { background: #f8d7da; color: #721c24; }
        .check-btn { margin-top: 15px; padding: 10px 20px; background: #2c3e50; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .loading { text-align: center; font-size: 1.2em; color: #e67e22; padding: 50px; }
    </style>
</head>
<body>

<nav>
    <a href="index.html">2주차</a>
    <a href="week3.html">3주차</a>
    <a href="week4.html">4주차</a>
    <a href="week5.html">5주차</a>
    <a href="week6.html">6주차</a>
    <a href="week7.html">7주차</a>
    <a href="all.html" class="current">전체 랜덤</a>
</nav>

<h1>전체 주차 실시간 랜덤 퀴즈</h1>
<div id="quiz-container"><div class="loading">각 파일에서 데이터를 불러오는 중...</div></div>

<script>
// 불러올 파일 목록
const fileList = [
    { name: "2주차", url: "index.html" },
    { name: "3주차", url: "week3.html" },
    { name: "4주차", url: "week4.html" },
    { name: "5주차", url: "week5.html" },
    { name: "6주차", url: "week6.html" },
    { name: "7주차", url: "week7.html" }
];

let globalIdx = 0;

// 1. 파일에서 데이터 추출하는 메인 함수
async function loadAndDisplayQuiz() {
    const container = document.getElementById('quiz-container');
    const allQuizHtml = [];

    try {
        for (const file of fileList) {
            const response = await fetch(file.url);
            const htmlText = await response.text();
            
            // DOMParser로 HTML 파싱
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlText, 'text/html');
            
            // script 태그 내의 data 객체 텍스트 추출
            const scripts = Array.from(doc.querySelectorAll('script'));
            const dataScript = scripts.find(s => s.textContent.includes('const data ='));
            
            if (dataScript) {
                // 문자열에서 객체 부분만 추출하여 JSON으로 변환 (eval 사용)
                const scriptContent = dataScript.textContent;
                const dataMatch = scriptContent.match(/const\s+data\s*=\s*(\{[\s\S]*?\});/);
                
                if (dataMatch) {
                    // 보안상 주의가 필요하지만, 로컬 환경에서 데이터를 가져오기 위해 사용
                    const data = new Function(`return ${dataMatch[1]}`)();
                    allQuizHtml.push(generateWeekHtml(file.name, data));
                }
            }
        }
        container.innerHTML = allQuizHtml.join('');
    } catch (error) {
        container.innerHTML = `<div class="loading" style="color:red">파일을 불러오는데 실패했습니다. (서버 환경 필요)<br>${error}</div>`;
    }
}

// 2. 랜덤하게 문제를 섞어서 HTML 생성
function generateWeekHtml(weekName, data) {
    const getRandom = (arr, n) => [...arr].sort(() => 0.5 - Math.random()).slice(0, n);
    
    let html = `<div class="week-section"><h2>${weekName}</h2>`;

    // 단답형 2개
    getRandom(data.short, 2).forEach(item => {
        const id = globalIdx++;
        html += `
            <div class="question-card">
                <span class="q-text">단답형: ${item.q}</span>
                <input type="text" id="in-${id}" placeholder="답안 입력">
                <button class="check-btn" onclick="checkShort('${id}', '${item.a}')">정답 확인</button>
                <div id="fb-${id}" class="feedback"></div>
            </div>`;
    });

    // 다지선다 3개
    getRandom(data.multiple, 3).forEach(item => {
        const id = globalIdx++;
        let opts = item.opts.map((o, i) => `<button class="opt-btn" onclick="this.classList.toggle('selected')">${i+1}. ${o}</button>`).join('');
        html += `
            <div class="question-card">
                <span class="q-text">다지선다: ${item.q}</span>
                <div class="options-grid" id="grid-${id}">${opts}</div>
                <button class="check-btn" onclick="checkMulti('${id}', [${item.ans}])">정답 확인</button>
                <div id="fb-${id}" class="feedback"></div>
            </div>`;
    });

    // 서술형 1개
    getRandom(data.essay, 1).forEach(item => {
        const id = globalIdx++;
        html += `
            <div class="question-card">
                <span class="q-text">서술형: ${item.q}</span>
                <textarea rows="3" placeholder="자유롭게 작성해 보세요"></textarea>
                <button class="check-btn" onclick="toggleEssay('${id}')">모범 답안 보기</button>
                <div id="fb-${id}" class="feedback" style="background:#e8f4fd; color:#0c5460; border:1px solid #bee5eb;"><strong>[모범 답안]</strong><br>${item.a}</div>
            </div>`;
    });

    return html + `</div>`;
}

// 3. 로직 함수들
function checkShort(id, correct) {
    const val = document.getElementById(`in-${id}`).value.trim();
    const f = document.getElementById(`fb-${id}`);
    f.style.display = 'block';
    if (val.includes(correct) && val !== "") {
        f.className = 'feedback correct';
        f.innerText = `정답입니다! (키워드: ${correct})`;
    } else {
        f.className = 'feedback wrong';
        f.innerText = `다시 생각해 보세요. (정답: ${correct})`;
    }
}

function checkMulti(id, correctIndices) {
    const btns = document.querySelectorAll(`#grid-${id} .opt-btn`);
    const f = document.getElementById(`fb-${id}`);
    let selected = [];
    btns.forEach((btn, idx) => { if(btn.classList.contains('selected')) selected.push(idx); });

    f.style.display = 'block';
    const isCorrect = JSON.stringify(selected.sort()) === JSON.stringify(correctIndices.sort());
    if (isCorrect && selected.length > 0) {
        f.className = 'feedback correct';
        f.innerText = "정확하게 모두 고르셨습니다!";
    } else {
        f.className = 'feedback wrong';
        f.innerText = `오답입니다. (정답 번호: ${correctIndices.map(v => v+1).join(', ')})`;
    }
}

function toggleEssay(id) {
    const f = document.getElementById(`fb-${id}`);
    f.style.display = (f.style.display === 'block') ? 'none' : 'block';
}

// 실행
loadAndDisplayQuiz();
</script>

</body>
</html>
